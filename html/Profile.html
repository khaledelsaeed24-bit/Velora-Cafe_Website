<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — VELORA</title>
    <link rel="stylesheet" href="../css/Home.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      body {
        background-color: #121212;
        color: #fff;
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 0;
        background-color: rgb(43, 29, 20);
      }
      .profile-container {
        max-width: 600px;
        margin: 150px auto;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 50px;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .profile-icon {
        font-size: 80px;
        color: #d4af37;
        margin-bottom: 20px;
      }
      .profile-name {
        font-size: 32px;
        margin: 0 0 10px 0;
        color: #d4af37;
      }
      .profile-email {
        font-size: 18px;
        color: #aaa;
        margin-bottom: 30px;
      }
      .profile-details {
        text-align: left;
        background: rgba(0, 0, 0, 0.2);
        padding: 25px;
        border-radius: 10px;
        margin-bottom: 40px;
      }
      .profile-details p {
        margin: 15px 0;
        font-size: 16px;
      }
      .profile-details strong {
        color: #d4af37;
        display: inline-block;
        width: 150px;
      }
      .logout-btn {
        display: inline-block;
        background: #dc3545;
        color: white;
        text-decoration: none;
        padding: 12px 30px;
        border-radius: 30px;
        font-weight: 600;
        transition: 0.3s;
      }
      .logout-btn:hover {
        background: #c82333;
      }
      .home-btn {
        display: inline-block;
        background: transparent;
        color: #d4af37;
        border: 2px solid #d4af37;
        text-decoration: none;
        padding: 10px 30px;
        border-radius: 30px;
        font-weight: 600;
        transition: 0.3s;
        margin-right: 15px;
      }
      .home-btn:hover {
        background: #d4af37;
        color: #121212;
      }
    </style>
  </head>
  <body>
    <header class="header-container">
      <a href="Home.html" class="left" style="text-decoration: none">VELORA</a>
      <div class="head" id="navMenu">
        <ul class="list">
          <li><a href="Home.html">HOME</a></li>
          <li><a href="Menu.html">MENU</a></li>
          <li><a href="Order.html">ORDER</a></li>
        </ul>
      </div>
    </header>
    <div class="profile-container" id="profileCard" style="display: none;">
      <i class="fa-solid fa-circle-user profile-icon"></i>
      <h1 class="profile-name" id="pName">Loading...</h1>
      <p class="profile-email" id="pEmail">...</p>
      <div class="profile-details">
        <p><strong>Account ID:</strong> <span id="pId">...</span></p>
        <p><strong>Member Since:</strong> <span id="pDate">...</span></p>
        <p><strong>Status:</strong> <span style="color: #28a745;">Active</span></p>
      </div>
      <div>
        <a href="Home.html" class="home-btn">Back to Home</a>
        <a href="../php/logout.php" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const response = await fetch('../php/get_profile.php');
          const data = await response.json();
          if (data.logged_in) {
            document.getElementById('profileCard').style.display = 'block';
            document.getElementById('pName').innerText = data.user.name;
            document.getElementById('pEmail').innerText = data.user.email;
            document.getElementById('pId').innerText = "#00" + data.user.id;
            const date = new Date(data.user.created_at);
            document.getElementById('pDate').innerText = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          } else {
            alert("You are not logged in!");
            window.location.href = 'index-login.html';
          }
        } catch (e) {
          console.error("Failed to load profile", e);
          alert("Error loading profile");
        }
      });
    </script>
  </body>
</html>
